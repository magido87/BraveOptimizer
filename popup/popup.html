<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Optimizer</title>
  <link rel="stylesheet" href="../styles/themes.css">
  <link rel="stylesheet" href="../styles/glassmorphism.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body data-theme="ocean">
  <div class="popup-container glass-panel">
    <!-- Liquid glass background blobs -->
    <div class="liquid-bg">
      <div class="liquid-blob blob-1"></div>
      <div class="liquid-blob blob-2"></div>
      <div class="liquid-blob blob-3"></div>
    </div>
    
    <!-- Header -->
    <header class="popup-header">
      <div class="header-content">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="glass-title">DOM Optimizer</h1>
          <span class="site-badge glass-badge" id="site-badge">Detecting...</span>
        </div>
      </div>
      <button class="settings-btn glass-btn-icon glass-tooltip" data-tooltip="Settings" id="settings-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Stats Section -->
    <section class="stats-section glass-card">
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="visible-count">0</span>
            <span class="stat-label">Visible</span>
          </div>
        </div>
        
        <div class="stat-item">
          <div class="stat-icon trimmed">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="trimmed-count">0</span>
            <span class="stat-label">Trimmed</span>
          </div>
        </div>
        
        <div class="stat-item">
          <div class="stat-icon total">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="stat-content">
            <span class="stat-value" id="total-count">0</span>
            <span class="stat-label">Total</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Main Actions -->
    <section class="actions-section">
      <div class="action-row">
        <button class="action-btn glass-btn glass-btn-primary" id="trim-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
          <span>Trim DOM</span>
        </button>
        
        <button class="action-btn glass-btn" id="restore-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
          </svg>
          <span>Restore All</span>
        </button>
      </div>
      
      <div class="action-row">
        <button class="action-btn glass-btn" id="memory-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
            <rect x="9" y="9" width="6" height="6"/>
            <line x1="9" y1="1" x2="9" y2="4"/>
            <line x1="15" y1="1" x2="15" y2="4"/>
            <line x1="9" y1="20" x2="9" y2="23"/>
            <line x1="15" y1="20" x2="15" y2="23"/>
            <line x1="20" y1="9" x2="23" y2="9"/>
            <line x1="20" y1="14" x2="23" y2="14"/>
            <line x1="1" y1="9" x2="4" y2="9"/>
            <line x1="1" y1="14" x2="4" y2="14"/>
          </svg>
          <span>Free Memory</span>
        </button>
        
        <button class="action-btn glass-btn glass-btn-danger" id="purge-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          <span>Purge Cache</span>
        </button>
      </div>
    </section>

    <!-- Slider Section -->
    <section class="slider-section glass-card">
      <div class="slider-header">
        <label class="slider-label">Max Visible Messages</label>
        <span class="slider-value" id="max-messages-value">50</span>
      </div>
      <input type="range" class="glass-slider" id="max-messages-slider" 
             min="5" max="200" value="50" step="5">
      <div class="slider-hints">
        <span>5</span>
        <span>Performance</span>
        <span>200</span>
      </div>
    </section>

    <!-- Toggle Section -->
    <section class="toggle-section">
      <div class="toggle-row glass-card">
        <div class="toggle-info">
          <span class="toggle-title">Auto-Trim Mode</span>
          <span class="toggle-desc">Automatically trim when at bottom</span>
        </div>
        <label class="glass-toggle">
          <input type="checkbox" id="auto-trim-toggle">
          <span class="glass-toggle-track">
            <span class="glass-toggle-thumb"></span>
          </span>
        </label>
      </div>
      
      <div class="toggle-row glass-card">
        <div class="toggle-info">
          <span class="toggle-title">Performance Boost</span>
          <span class="toggle-desc">Pause animations & optimize</span>
        </div>
        <label class="glass-toggle">
          <input type="checkbox" id="perf-boost-toggle">
          <span class="glass-toggle-track">
            <span class="glass-toggle-thumb"></span>
          </span>
        </label>
      </div>
      
      <div class="toggle-row glass-card">
        <div class="toggle-info">
          <span class="toggle-title">Lazy Loading</span>
          <span class="toggle-desc">Load older messages on scroll</span>
        </div>
        <label class="glass-toggle">
          <input type="checkbox" id="lazy-load-toggle" checked>
          <span class="glass-toggle-track">
            <span class="glass-toggle-thumb"></span>
          </span>
        </label>
      </div>
    </section>

    <!-- Theme Section -->
    <section class="theme-section glass-card">
      <span class="section-title">Theme</span>
      <div class="theme-grid" id="theme-grid">
        <!-- Themes will be injected by JS -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <div class="hotkey-hints">
        <span class="hotkey">Alt+T</span> Trim
        <span class="hotkey">Alt+R</span> Restore
        <span class="hotkey">Alt+A</span> Auto
      </div>
    </footer>
  </div>

  <script src="../utils/config.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
